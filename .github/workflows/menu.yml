name: LCC Menu Automation

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'   # 22:00 España

jobs:
  capturar-menu:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run menu capture
        run: node menu.js
