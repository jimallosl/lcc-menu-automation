name: LCC Menu Automation

on:
  workflow_dispatch:
  schedule:
    - cron: '0 23 * * *'
    - cron: '20 23 * * *'

concurrency:
  group: lcc-menu-automation
  cancel-in-progress: false

jobs:
  capturar-menu:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # 🔥 ESTA ES LA CLAVE
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run menu capture
        run: node menu.js
